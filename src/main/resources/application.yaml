spring:
  application:
    name: imms-backend
  profiles:
    active: dev # Change this to 'prod' when you are ready to switch to Supabase

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: "health"

# Cloudinary - shared across all profiles (same account for dev & prod)
cloudinary:
  cloud-name: di6r3oggs
  api-key: "624134459765584"
  api-secret: Um6QoySn8er6aK5vm_0gWv5XB3I


# --- DEVELOPMENT CONFIGURATION ---
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/imms_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB


